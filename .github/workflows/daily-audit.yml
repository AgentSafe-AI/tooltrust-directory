name: Daily Security Audit

on:
  schedule:
    # Every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_rescan:
        description: 'Ignore existing versions and re-scan all discovered tools'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  REPORTS_DIR: data/reports
  PENDING_SCANS_PATH: data/pending-scans.json

jobs:
  # ── 1. Discover ──────────────────────────────────────────────────────────────
  discover:
    name: Discover MCP Tools
    runs-on: ubuntu-latest
    outputs:
      has_pending: ${{ steps.check.outputs.has_pending }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          PENDING_SCANS_PATH: ${{ env.PENDING_SCANS_PATH }}
        run: go run ./cmd/crawler

      - name: Check for pending scans
        id: check
        run: |
          if [ ! -f "${{ env.PENDING_SCANS_PATH }}" ]; then
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(jq 'length' "${{ env.PENDING_SCANS_PATH }}")
          echo "Pending tools: $COUNT"
          if [ "$COUNT" -gt 0 ] || [ "${{ inputs.force_rescan }}" = "true" ]; then
            echo "has_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload pending-scans artifact
        if: steps.check.outputs.has_pending == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pending-scans
          path: ${{ env.PENDING_SCANS_PATH }}
          retention-days: 1

  # ── 2. Scan ──────────────────────────────────────────────────────────────────
  scan:
    name: Run AgentSentry Scans
    needs: discover
    if: needs.discover.outputs.has_pending == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # cache: false — avoids tar/race conflict with discover job's cache upload.
      # The scan job reads Go source but never writes a new cache.
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Download pending-scans artifact
        uses: actions/download-artifact@v4
        with:
          name: pending-scans
          path: data/

      # ── Install AgentSentry ──────────────────────────────────────────────────
      # Strategy:
      #   1. Try downloading the pre-built binary from the latest GitHub release.
      #   2. Verify the download is an ELF binary (not a 404 HTML page).
      #   3. Fall back to the official Docker image if the binary is unavailable.
      #
      # Binary URL: https://github.com/AgentSafe-AI/agentsentry/releases/latest
      # Docker:     ghcr.io/agentsafe-ai/agentsentry:latest
      - name: Install AgentSentry
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/')
          BINARY_URL="https://github.com/AgentSafe-AI/agentsentry/releases/latest/download/agentsentry_${OS}_${ARCH}"

          echo "Attempting binary install from: $BINARY_URL"
          HTTP_STATUS=$(curl -sL --write-out "%{http_code}" "$BINARY_URL" \
            -o /usr/local/bin/agentsentry)

          if [ "$HTTP_STATUS" = "200" ] && file /usr/local/bin/agentsentry | grep -q 'ELF'; then
            chmod +x /usr/local/bin/agentsentry
            echo "Binary installed OK."
            agentsentry --version
            echo "AGENTSENTRY_MODE=binary" >> "$GITHUB_ENV"
          else
            echo "Binary unavailable (HTTP $HTTP_STATUS) or not an ELF — falling back to Docker."
            rm -f /usr/local/bin/agentsentry
            docker pull ghcr.io/agentsafe-ai/agentsentry:latest
            echo "AGENTSENTRY_MODE=docker" >> "$GITHUB_ENV"
          fi

      - name: Scan each pending tool
        run: |
          PENDING="${{ env.PENDING_SCANS_PATH }}"
          COUNT=$(jq 'length' "$PENDING")
          echo "Scanning $COUNT tool(s) via $AGENTSENTRY_MODE…"
          mkdir -p "${{ env.REPORTS_DIR }}"

          run_agentsentry() {
            local INPUT="$1"
            local OUTPUT="$2"
            if [ "$AGENTSENTRY_MODE" = "binary" ]; then
              agentsentry scan --protocol mcp --input "$INPUT" > "$OUTPUT"
            else
              docker run --rm \
                -v "$(realpath "$INPUT"):/tools.json:ro" \
                ghcr.io/agentsafe-ai/agentsentry:latest \
                scan --protocol mcp --input /tools.json > "$OUTPUT"
            fi
          }

          for i in $(seq 0 $((COUNT - 1))); do
            TOOL_ID=$(jq -r ".[$i].tool_id"    "$PENDING")
            VERSION=$(jq -r ".[$i].version"    "$PENDING")
            OWNER=$(jq  -r ".[$i].repo_owner"  "$PENDING")
            REPO=$(jq   -r ".[$i].repo_name"   "$PENDING")
            SOURCE=$(jq -r ".[$i].source_url"  "$PENDING")
            OUT="${{ env.REPORTS_DIR }}/${TOOL_ID}.json"
            CLONE_DIR="/tmp/${TOOL_ID}"
            RAW_OUT="/tmp/${TOOL_ID}-agentsentry.json"

            echo "════════════════════════════════════════"
            echo "Tool : $TOOL_ID @ $VERSION  ($OWNER/$REPO)"

            # Shallow-clone at release tag, fall back to HEAD
            git clone --depth 1 --branch "v${VERSION}" \
              "https://github.com/${OWNER}/${REPO}" "$CLONE_DIR" 2>/dev/null || \
            git clone --depth 1 \
              "https://github.com/${OWNER}/${REPO}" "$CLONE_DIR" 2>/dev/null || \
            { echo "SKIP: cannot clone $OWNER/$REPO"; continue; }

            # Find MCP tool-definition file
            TOOL_DEF=""
            for candidate in tools.json mcp.json .mcp/tools.json src/tools.json; do
              [ -f "$CLONE_DIR/$candidate" ] && TOOL_DEF="$CLONE_DIR/$candidate" && break
            done

            if [ -z "$TOOL_DEF" ]; then
              echo "SKIP: no tool-definition file found in $OWNER/$REPO"
              rm -rf "$CLONE_DIR"; continue
            fi
            echo "Def  : $TOOL_DEF"

            if ! run_agentsentry "$TOOL_DEF" "$RAW_OUT"; then
              echo "SKIP: AgentSentry scan failed for $TOOL_ID"
              rm -rf "$CLONE_DIR"; continue
            fi

            if ! go run ./cmd/transform \
              --input   "$RAW_OUT"  \
              --tool-id "$TOOL_ID"  \
              --version "$VERSION"  \
              --source  "$SOURCE"   \
              --output  "$OUT"; then
              echo "SKIP: transform failed for $TOOL_ID"
            else
              echo "OK   : $OUT"
            fi

            rm -rf "$CLONE_DIR" "$RAW_OUT"
          done

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 1

  # ── 3. Publish ───────────────────────────────────────────────────────────────
  publish:
    name: Publish Results & Update Registry
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Use REGISTRY_PUSH_TOKEN (PAT) if branch protection is enabled;
          # GITHUB_TOKEN is sufficient for a repo with no protection rules.
          token: ${{ secrets.REGISTRY_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          name: scan-results
          path: ${{ env.REPORTS_DIR }}/

      - name: Configure Git identity
        run: |
          git config user.name  "AgentSentry Bot"
          git config user.email "bot@agentsafe.ai"

      - name: Regenerate README registry & push
        env:
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          README_PATH: README.md
          REPO_DIR: .
        run: go run ./cmd/sync

      - name: Write job summary
        run: |
          echo "### 🛡️ Registry Updated — $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | Grade | Risk Score |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|:-----:|:----------:|" >> "$GITHUB_STEP_SUMMARY"
          for f in data/reports/*.json; do
            TOOL=$(jq  -r '.tool_id'    "$f")
            GRADE=$(jq -r '.grade'      "$f")
            SCORE=$(jq -r '.risk_score' "$f")
            echo "| $TOOL | **$GRADE** | $SCORE |" >> "$GITHUB_STEP_SUMMARY"
          done

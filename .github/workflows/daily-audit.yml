name: Daily Security Audit

on:
  schedule:
    # Every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_rescan:
        description: 'Ignore existing versions and re-scan all discovered tools'
        required: false
        default: 'true'

permissions:
  contents: write

env:
  GO_VERSION: '1.26'
  REPORTS_DIR: data/reports
  PENDING_SCANS_PATH: data/pending-scans.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Discover ──────────────────────────────────────────────────────────────
  discover:
    name: Discover MCP Tools
    runs-on: ubuntu-latest
    outputs:
      has_pending: ${{ steps.check.outputs.has_pending }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          PENDING_SCANS_PATH: ${{ env.PENDING_SCANS_PATH }}
          FORCE_RESCAN: ${{ inputs.force_rescan }}
        run: go run ./cmd/crawler

      - name: Check for pending scans
        id: check
        run: |
          if [ ! -f "${{ env.PENDING_SCANS_PATH }}" ]; then
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(jq 'length' "${{ env.PENDING_SCANS_PATH }}")
          FORCE="${{ inputs.force_rescan }}"
          echo "Pending tools: $COUNT (force_rescan=${FORCE:-false})"
          if [ "$COUNT" -gt 0 ] || [ "${FORCE:-false}" = "true" ]; then
            echo "has_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload pending-scans artifact
        if: steps.check.outputs.has_pending == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pending-scans
          path: ${{ env.PENDING_SCANS_PATH }}
          retention-days: 1

  # ── 2. Scan ──────────────────────────────────────────────────────────────────
  scan:
    name: Run ToolTrust Scanner
    needs: discover
    if: needs.discover.outputs.has_pending == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # cache: false — avoids tar/race conflict with discover job's cache upload.
      # The scan job reads Go source but never writes a new cache.
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Download pending-scans artifact
        uses: actions/download-artifact@v4
        with:
          name: pending-scans
          path: data/

      # ── Install ToolTrust Scanner ────────────────────────────────────────────
      # Build from source — the repo is public and Go is already available.
      # Pre-built binaries and the GHCR image are not yet publicly distributed.
      # Clone at the latest git tag (stable release) rather than main HEAD so a
      # broken commit on the scanner's main branch cannot cascade into a CI failure.
      # https://github.com/AgentSafe-AI/tooltrust-scanner
      - name: Build ToolTrust Scanner from source
        run: |
          # Resolve the latest semver tag; fall back to main HEAD if no tags exist.
          LATEST_TAG=$(git ls-remote --tags --sort=-version:refname \
            https://github.com/AgentSafe-AI/tooltrust-scanner \
            'refs/tags/v*' | head -1 | sed 's|.*refs/tags/||')
          if [ -n "$LATEST_TAG" ]; then
            echo "Cloning tooltrust-scanner at tag ${LATEST_TAG}"
            git clone --depth 1 --branch "$LATEST_TAG" \
              https://github.com/AgentSafe-AI/tooltrust-scanner /tmp/tooltrust-scanner
          else
            echo "No tags found — cloning tooltrust-scanner at main HEAD"
            git clone --depth 1 \
              https://github.com/AgentSafe-AI/tooltrust-scanner /tmp/tooltrust-scanner
          fi

          SCANNER_TAG="v$(cat /tmp/tooltrust-scanner/VERSION 2>/dev/null || echo "dev")"
          echo "SCANNER_VERSION=${SCANNER_TAG}" >> "$GITHUB_ENV"
          echo "Scanner version: ${SCANNER_TAG}"

          cd /tmp/tooltrust-scanner
          go build \
            -ldflags "-X main.version=${SCANNER_TAG}" \
            -o /usr/local/bin/tooltrust-scanner \
            ./cmd/tooltrust-scanner
          tooltrust-scanner version

      # Pre-build internal Go tools once before the parallel scan loop.
      # Running `go run` inside each subshell compiles the same packages
      # concurrently, which causes cache-lock contention and slows the scan.
      - name: Build internal Go tools
        run: |
          go build -o /usr/local/bin/tt-analyze    ./cmd/analyze
          go build -o /usr/local/bin/tt-fetch      ./cmd/smithery-fetch
          go build -o /usr/local/bin/tt-transform  ./cmd/transform
          echo "Internal tools built OK"

      - name: Scan each pending tool
        run: |
          PENDING="${{ env.PENDING_SCANS_PATH }}"
          COUNT=$(jq 'length' "$PENDING")
          echo "Scanning $COUNT tool(s)…"
          mkdir -p "${{ env.REPORTS_DIR }}"

          if [ "$COUNT" -eq 0 ]; then
            echo "Nothing to scan."
            exit 0
          fi

          # count the number of policy entries in a scanner output file.
          scan_tool_count() {
            local f="$1"
            [ -f "$f" ] || { echo 0; return; }
            jq 'if .policies then (.policies | length) else 0 end' "$f" 2>/dev/null || echo 0
          }
          export -f scan_tool_count

          # Run up to CONCURRENCY scans in parallel.
          CONCURRENCY=10
          RUNNING=0

          for i in $(seq 0 $((COUNT - 1))); do
          (
            TOOL_ID=$(jq  -r ".[$i].tool_id"      "$PENDING")
            VERSION=$(jq  -r ".[$i].version"      "$PENDING")
            OWNER=$(jq    -r ".[$i].repo_owner"   "$PENDING")
            REPO=$(jq     -r ".[$i].repo_name"    "$PENDING")
            SOURCE=$(jq   -r ".[$i].source_url"   "$PENDING")
            VENDOR=$(jq   -r ".[$i].vendor"       "$PENDING")
            STARS=$(jq    -r ".[$i].stars"        "$PENDING")
            LANGUAGE=$(jq -r ".[$i].language"     "$PENDING")
            CATEGORY=$(jq -r ".[$i].category"     "$PENDING")
            LICENSE=$(jq  -r ".[$i].license"      "$PENDING")
            DESC=$(jq     -r ".[$i].description"  "$PENDING")
            # npm_package override: set by seed overrides for monorepo tools whose
            # root package.json does not identify the individual MCP server.
            NPM_PKG_OVERRIDE=$(jq -r ".[$i].npm_package // empty" "$PENDING")
            # smithery_qualified_name: set for Smithery-discovered tools.
            # Used for a direct registry lookup, bypassing keyword search.
            SMITHERY_QN=$(jq -r ".[$i].smithery_qualified_name // empty" "$PENDING")
            OUT="${{ env.REPORTS_DIR }}/${TOOL_ID}.json"
            CLONE_DIR="/tmp/${TOOL_ID}"
            RAW_OUT="/tmp/${TOOL_ID}-scan.json"
            OSV_OUT="/tmp/${TOOL_ID}-osv.json"

            echo "════════════════════════════════════════"
            echo "Tool    : $TOOL_ID @ $VERSION  ($OWNER/$REPO)"
            echo "Vendor  : $VENDOR  ⭐ $STARS  License: $LICENSE"

            if [ -n "$OWNER" ]; then
              # Shallow-clone at release tag, fall back to HEAD
              git clone --depth 1 --branch "v${VERSION}" \
                "https://github.com/${OWNER}/${REPO}" "$CLONE_DIR" 2>/dev/null || \
              git clone --depth 1 \
                "https://github.com/${OWNER}/${REPO}" "$CLONE_DIR" 2>/dev/null || \
              { echo "SKIP: cannot clone $OWNER/$REPO"; exit 0; }

              # ── AS-004: OSV supply-chain CVE scan ───────────────────────────
              tt-analyze --dir "$CLONE_DIR" --output "$OSV_OUT" || \
                echo "[]" > "$OSV_OUT"
              echo "AS-004  : $(jq 'length' "$OSV_OUT") CVE finding(s)"
            else
              echo "SMITHERY-NATIVE: no GitHub repo — skipping clone and OSV scan"
              echo "[]" > "$OSV_OUT"
            fi

            # ── ToolTrust Scanner: MCP tool-definition scan ───────────────────
            TOOL_DEF=""

            if [ -n "$OWNER" ] && [ -d "$CLONE_DIR" ]; then
              # 1. Explicit manifest files — ordered most-specific first.
              for candidate in \
                tools.json mcp.json server.json \
                testdata/tools.json \
                .mcp/tools.json \
                src/tools.json \
                src/testdata/tools.json \
                src/mcp.json \
                test/tools.json \
                tools/tools.json; do
                if [ -f "$CLONE_DIR/$candidate" ]; then
                  # Validate the file looks like an MCP tools array/object
                  if jq -e '(.tools // .)|arrays|length > 0' "$CLONE_DIR/$candidate" >/dev/null 2>&1; then
                    TOOL_DEF="$CLONE_DIR/$candidate"
                    break
                  fi
                fi
              done

              # 2. Recursive find: any JSON with a "tools" array (skills/, tools/)
              if [ -z "$TOOL_DEF" ]; then
                while IFS= read -r f; do
                  if jq -e '.tools|arrays|length > 0' "$f" >/dev/null 2>&1; then
                    TOOL_DEF="$f"
                    break
                  fi
                done < <(find "$CLONE_DIR" \
                  -not -path '*/.git/*' \
                  -not -path '*/node_modules/*' \
                  -not -name 'package*.json' \
                  -not -name 'tsconfig*.json' \
                  -name '*.json' 2>/dev/null | sort)
              fi
            fi

            # ── Tier 3: live MCP server scan (no static manifest found) ──────────
            # Source-code extraction (grep fallback) is intentionally absent:
            # it produced false positives (enum values, class names, constants).
            # If no manifest exists we attempt a real tools/list connection instead.
            SCAN_OK=false
            # Set to true only when a scan tier ran successfully but returned 0
            # tools — this is a confirmed "no tools", not a transient failure.
            # Used to guard the stale Grade-A cleanup: we only delete a report
            # when we can confirm the tool is genuinely empty, not when every
            # tier crashed or timed out (which would wrongly remove valid reports).
            CONFIRMED_ZERO=false

            if [ -n "$TOOL_DEF" ]; then
              echo "Def     : $TOOL_DEF"
              if tooltrust-scanner scan \
                  --protocol mcp \
                  --input "$TOOL_DEF" \
                  --output json \
                  --file "$RAW_OUT" \
                  --deep-scan; then
                STATIC_TOOL_COUNT=$(scan_tool_count "$RAW_OUT")
                if [ "$STATIC_TOOL_COUNT" -gt 0 ]; then
                  echo "STATIC  : scan succeeded ($STATIC_TOOL_COUNT tool(s))"
                  SCAN_OK=true
                else
                  echo "UNSCANNABLE: static scan returned 0 tools for $TOOL_DEF — fake Grade A guard triggered"
                  CONFIRMED_ZERO=true
                fi
              else
                echo "UNSCANNABLE: static scan failed for $TOOL_DEF"
              fi
            else
              # Prefer explicit npm_package override (set for monorepo tools);
              # fall back to auto-detection from the cloned repo's package.json.
              NPM_PKG="${NPM_PKG_OVERRIDE:-}"
              if [ -n "$NPM_PKG" ]; then
                echo "NPM_PKG : $NPM_PKG (from seed override)"
              else
                for pkg_json in \
                  "$CLONE_DIR/package.json" \
                  "$CLONE_DIR/server/package.json" \
                  "$CLONE_DIR/src/package.json"; do
                  if [ -f "$pkg_json" ]; then
                    CANDIDATE=$(jq -r '.name // empty' "$pkg_json" 2>/dev/null)
                    if [ -n "$CANDIDATE" ] && [ "$CANDIDATE" != "null" ]; then
                      NPM_PKG="$CANDIDATE"
                      break
                    fi
                  fi
                done
              fi

              if [ -n "$NPM_PKG" ]; then
                # ── Step 1: Live Scan ──────────────────────────────────────────
                echo "LIVE    : no static manifest — trying live scan: npx -y ${NPM_PKG}"
                if tooltrust-scanner scan \
                    --server "npx -y ${NPM_PKG}" \
                    --output json \
                    --file "$RAW_OUT"; then
                  # ── Step 2: Check — exit 0 alone is not enough; must have ≥1 tool
                  LIVE_TOOL_COUNT=$(scan_tool_count "$RAW_OUT")
                  if [ "$LIVE_TOOL_COUNT" -gt 0 ]; then
                    echo "LIVE    : live scan succeeded ($LIVE_TOOL_COUNT tool(s))"
                    SCAN_OK=true
                  else
                    echo "LIVE    : live scan returned 0 tools — fake Grade A guard triggered, trying Smithery fallback"
                    CONFIRMED_ZERO=true
                  fi
                else
                  echo "LIVE    : live scan crashed (non-zero exit) — trying Smithery fallback"
                fi
              else
                echo "UNSCANNABLE: no static manifest and no npm package detected"
                CONFIRMED_ZERO=true
              fi
            fi

            # ── Tier 3.4: Static tools manifest override ──────────────────────
            # For servers that can't be live-scanned (e.g. Python/uvx packages),
            # a curated tools.json can be placed in data/static-tools/<tool_id>.json.
            # This takes priority over Smithery to prevent wrong-server matching.
            STATIC_OVERRIDE="data/static-tools/${TOOL_ID}.json"
            if [ "$SCAN_OK" = "false" ] && [ -f "$STATIC_OVERRIDE" ]; then
              echo "STATIC_OVERRIDE: using $STATIC_OVERRIDE"
              if tooltrust-scanner scan \
                  --protocol mcp \
                  --input    "$STATIC_OVERRIDE" \
                  --output   json \
                  --file     "$RAW_OUT" \
                  --deep-scan; then
                OVERRIDE_TOOL_COUNT=$(scan_tool_count "$RAW_OUT")
                if [ "$OVERRIDE_TOOL_COUNT" -gt 0 ]; then
                  echo "STATIC_OVERRIDE: scan succeeded ($OVERRIDE_TOOL_COUNT tool(s))"
                  SCAN_OK=true
                else
                  echo "STATIC_OVERRIDE: scan returned 0 tools — falling through to Smithery"
                  CONFIRMED_ZERO=true
                fi
              else
                echo "STATIC_OVERRIDE: scan crashed — falling through to Smithery"
              fi
            fi

            # ── Tier 3.5: Smithery registry fallback ─────────────────────────
            # When both static manifest lookup and live npm scanning fail, query
            # the Smithery registry for pre-indexed tool definitions.  Two probe
            # candidates are tried: the npm package name (if detected) and the
            # GitHub owner/repo slug.
            if [ "$SCAN_OK" = "false" ]; then
              SMITHERY_OUT="/tmp/${TOOL_ID}-smithery-tools.json"
              SMITHERY_OK=false

              # Prefer the direct qualifiedName from discovery (no keyword search ambiguity).
              OWNER_REPO=""
              [ -n "$OWNER" ] && OWNER_REPO="${OWNER}/${REPO}"
              for SMITHERY_PKG in "${SMITHERY_QN:-}" "${NPM_PKG:-}" "${OWNER_REPO:-}"; do
                [ -z "$SMITHERY_PKG" ] && continue
                echo "SMITHERY: querying Smithery registry for \"${SMITHERY_PKG}\""
                if tt-fetch \
                    --package "${SMITHERY_PKG}" \
                    --output  "${SMITHERY_OUT}"; then
                  # ── Step 3: Smithery scan — also guard against 0-tool output
                  echo "SMITHERY: manifest fetched — running static scan"
                  if tooltrust-scanner scan \
                      --protocol mcp \
                      --input    "${SMITHERY_OUT}" \
                      --output   json \
                      --file     "$RAW_OUT" \
                      --deep-scan; then
                    SMITHERY_TOOL_COUNT=$(scan_tool_count "$RAW_OUT")
                    if [ "$SMITHERY_TOOL_COUNT" -gt 0 ]; then
                      echo "SMITHERY: scan succeeded for \"${SMITHERY_PKG}\" ($SMITHERY_TOOL_COUNT tool(s))"
                      SCAN_OK=true
                      SMITHERY_OK=true
                    else
                      # ── Step 4: Smithery returned 0 tools — hard block on Grade A
                      echo "SMITHERY: scan returned 0 tools for \"${SMITHERY_PKG}\" — fake Grade A guard triggered"
                      CONFIRMED_ZERO=true
                    fi
                  else
                    echo "SMITHERY: scan failed for \"${SMITHERY_PKG}\""
                  fi
                  rm -f "${SMITHERY_OUT}"
                  # Stop probing once we have a manifest (even if scan yielded 0 tools)
                  break
                fi
              done

              if [ "$SMITHERY_OK" = "false" ] && [ "$SCAN_OK" = "false" ]; then
                echo "SMITHERY: no usable tool definitions found in Smithery registry"
                CONFIRMED_ZERO=true
              fi
            fi

            # Fail fast — skip tools we cannot scan rather than emit a fake Grade A.
            # Also remove any stale report that may have been produced by a previous
            # run before this guard existed; without this, an old Grade A report
            # would persist in the registry indefinitely.
            if [ "$SCAN_OK" = "false" ]; then
              echo "SKIP    : $TOOL_ID marked unscannable — no report generated"
              if [ -f "$OUT" ] && [ "$CONFIRMED_ZERO" = "true" ]; then
                # Remove the stale report regardless of grade: a confirmed zero-tool
                # result means the up-to-date scanner genuinely cannot scan this server.
                # Keeping an old report (even Grade B/C/D/F) would misrepresent the
                # server's current state.  We only remove on CONFIRMED_ZERO (a scan
                # tier ran and returned 0 tools), never on crash/timeout.
                echo "CLEANUP : removing stale report $OUT (confirmed zero tools — up-to-date scanner cannot scan this server)"
                rm -f "$OUT"
              elif [ -f "$OUT" ]; then
                echo "PRESERVE: keeping existing report — scan tiers crashed/timed-out (not confirmed zero)"
              fi
              rm -rf "$CLONE_DIR" "$RAW_OUT" "$OSV_OUT"
              exit 0
            fi

            # ── Transform: merge Scanner + OSV → ToolTrust report ──────────────
            # Pass --existing so transform can detect rug-pull (AS-012): if the
            # tool set changed between scans of the same version, flag it.
            EXISTING_FLAG=""
            [ -f "$OUT" ] && EXISTING_FLAG="--existing $OUT"
            if ! tt-transform \
              --input            "$RAW_OUT"             \
              --tool-id          "$TOOL_ID"             \
              --version          "$VERSION"             \
              --source           "$SOURCE"              \
              --vendor           "$VENDOR"              \
              --stars            "$STARS"               \
              --license          "$LICENSE"             \
              --language         "$LANGUAGE"            \
              --category         "$CATEGORY"            \
              --description      "$DESC"                \
              --osv-findings     "$OSV_OUT"             \
              --scanner-version  "$SCANNER_VERSION"     \
              ${EXISTING_FLAG}                          \
              --output           "$OUT"; then
              echo "SKIP: transform failed for $TOOL_ID"
            else
              echo "OK      : $OUT"
            fi

            rm -rf "$CLONE_DIR" "$RAW_OUT" "$OSV_OUT"
          ) &
          RUNNING=$((RUNNING + 1))
          if [ "$RUNNING" -ge "$CONCURRENCY" ]; then
            wait -n
            RUNNING=$((RUNNING - 1))
          fi
          done
          wait  # drain remaining background jobs

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 1

  # ── 3. Publish ───────────────────────────────────────────────────────────────
  publish:
    name: Publish Results & Update Registry
    needs: scan
    if: ${{ !cancelled() && needs.scan.result != 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Use REGISTRY_PUSH_TOKEN (PAT) if branch protection is enabled;
          # GITHUB_TOKEN is sufficient for a repo with no protection rules.
          token: ${{ secrets.REGISTRY_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download scan results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: scan-results
          path: ${{ env.REPORTS_DIR }}/

      - name: Configure Git identity
        run: |
          git config user.name  "ToolTrust Bot"
          git config user.email "bot@agentsafe.ai"

      - name: Regenerate README registry & push
        env:
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          README_PATH: README.md
          REPO_DIR: .
        run: go run ./cmd/sync

      - name: Write job summary
        run: |
          echo "### 🛡️ Registry Updated — $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          TOTAL=$(ls data/reports/*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "**${TOTAL} tools** audited." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Only show tools with findings (grade B or worse) to keep summary focused
          echo "#### ⚠️ Tools with findings" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | Grade | Score | Key Findings |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|:-----:|:-----:|:-------------|" >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          for f in data/reports/*.json; do
            GRADE=$(jq -r '.grade' "$f")
            if [ "$GRADE" = "A" ]; then continue; fi
            TOOL=$(jq  -r '.tool_id'    "$f")
            SCORE=$(jq -r '.risk_score' "$f")
            FINDINGS=$(jq -r '[.findings[].id] | group_by(.) | map("\(.[0]) ×\(length)") | join(", ") // "—"' "$f")
            echo "| $TOOL | **$GRADE** | $SCORE | $FINDINGS |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### ✅ Grade A tools" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          A_COUNT=0
          A_TOOLS=""
          for f in data/reports/*.json; do
            GRADE=$(jq -r '.grade' "$f")
            if [ "$GRADE" = "A" ]; then
              TOOL=$(jq -r '.tool_id' "$f")
              A_TOOLS="${A_TOOLS:+$A_TOOLS, }\`$TOOL\`"
              A_COUNT=$((A_COUNT + 1))
            fi
          done
          echo "**${A_COUNT} tools** passed with no significant findings: ${A_TOOLS}" >> "$GITHUB_STEP_SUMMARY"

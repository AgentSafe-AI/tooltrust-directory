name: Daily Security Audit

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_rescan:
        description: 'Re-scan all tools regardless of version (true/false)'
        required: false
        default: 'false'

# Allow the workflow to push commits back to this repository.
permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  REPORTS_DIR: data/reports
  PENDING_SCANS_PATH: data/pending-scans.json

jobs:
  # ── 1. Discovery ─────────────────────────────────────────────────────────────
  discover:
    name: Discover MCP Tools
    runs-on: ubuntu-latest
    outputs:
      has_pending: ${{ steps.check.outputs.has_pending }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          PENDING_SCANS_PATH: ${{ env.PENDING_SCANS_PATH }}
        run: go run ./cmd/crawler

      - name: Check for pending scans
        id: check
        run: |
          if [ -f "${{ env.PENDING_SCANS_PATH }}" ]; then
            COUNT=$(jq 'length' "${{ env.PENDING_SCANS_PATH }}")
            echo "Pending scans: $COUNT"
            if [ "$COUNT" -gt 0 ] || [ "${{ inputs.force_rescan }}" = "true" ]; then
              echo "has_pending=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_pending=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload pending scans artifact
        if: steps.check.outputs.has_pending == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pending-scans
          path: ${{ env.PENDING_SCANS_PATH }}
          retention-days: 1

  # ── 2. Scan ──────────────────────────────────────────────────────────────────
  scan:
    name: Run AgentSentry Scans
    needs: discover
    if: needs.discover.outputs.has_pending == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download pending scans
        uses: actions/download-artifact@v4
        with:
          name: pending-scans
          path: data/

      # ── Install AgentSentry ──────────────────────────────────────────────────
      # When the AgentSentry binary is published as a GitHub Release asset,
      # replace this step with the real download:
      #
      #   curl -sL \
      #     https://github.com/AgentSafe-AI/agentsentry/releases/latest/download/agentsentry-linux-amd64 \
      #     -o /usr/local/bin/agentsentry
      #   chmod +x /usr/local/bin/agentsentry
      #
      - name: Install AgentSentry (placeholder)
        run: |
          cat > /usr/local/bin/agentsentry << 'EOF'
          #!/usr/bin/env bash
          # Stub: replace with real AgentSentry binary.
          # Expected call signature:
          #   agentsentry scan --source <url> --version <ver> --output <path>
          echo "AgentSentry stub: scan not yet wired — skipping $*" >&2
          exit 0
          EOF
          chmod +x /usr/local/bin/agentsentry

      - name: Scan each pending tool
        env:
          AGENTSENTRY_TOKEN: ${{ secrets.AGENTSENTRY_TOKEN }}
        run: |
          PENDING="${{ env.PENDING_SCANS_PATH }}"
          if [ ! -f "$PENDING" ]; then
            echo "No pending scans file found."
            exit 0
          fi

          COUNT=$(jq 'length' "$PENDING")
          echo "Scanning $COUNT tool(s)..."

          for i in $(seq 0 $((COUNT - 1))); do
            TOOL_ID=$(jq -r ".[$i].tool_id"   "$PENDING")
            VERSION=$(jq -r ".[$i].version"   "$PENDING")
            SOURCE=$(jq -r  ".[$i].source_url" "$PENDING")
            OUT="data/reports/${TOOL_ID}.json"

            echo "──────────────────────────────────────────"
            echo "Scanning: $TOOL_ID @ $VERSION"
            echo "Source  : $SOURCE"
            echo "Output  : $OUT"

            agentsentry scan \
              --source  "$SOURCE" \
              --version "$VERSION" \
              --output  "$OUT"

            if [ $? -ne 0 ]; then
              echo "WARNING: scan failed for $TOOL_ID — skipping"
              continue
            fi

            # Validate the output against our JSON Schema.
            if command -v ajv &>/dev/null; then
              ajv validate -s report.schema.json -d "$OUT" --spec=draft2020 || \
                echo "WARNING: $OUT failed schema validation"
            fi
          done

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 1

  # ── 3. Publish ───────────────────────────────────────────────────────────────
  publish:
    name: Publish Results & Update Registry
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT (REGISTRY_PUSH_TOKEN) if you need to bypass branch
          # protection rules; GITHUB_TOKEN is sufficient otherwise.
          token: ${{ secrets.REGISTRY_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          name: scan-results
          path: ${{ env.REPORTS_DIR }}/

      - name: Configure Git identity
        run: |
          git config user.name  "AgentSentry Bot"
          git config user.email "bot@agentsafe.ai"

      - name: Regenerate README registry & push
        env:
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          README_PATH: README.md
          REPO_DIR: .
        run: go run ./cmd/sync

      - name: Summary
        run: |
          echo "### Registry Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Reports in \`data/reports/\`:" >> "$GITHUB_STEP_SUMMARY"
          ls data/reports/*.json | while read f; do
            TOOL=$(jq -r '.tool_id' "$f")
            GRADE=$(jq -r '.grade'  "$f")
            SCORE=$(jq -r '.risk_score' "$f")
            echo "- **$TOOL** — Grade **$GRADE** (score: $SCORE)" >> "$GITHUB_STEP_SUMMARY"
          done
